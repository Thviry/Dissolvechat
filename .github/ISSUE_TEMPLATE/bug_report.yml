name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows (desktop app)
        - macOS (desktop app)
        - Linux (desktop app)
        - Web client (Chrome)
        - Web client (Firefox)
        - Web client (Safari)
        - Web client (other)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Found in Settings or the title bar
      placeholder: "0.1.6-beta"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what went wrong
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Open the app
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else that might help
    validations:
      required: false
