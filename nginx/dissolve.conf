# Dissolve relay nginx reverse proxy configuration
#
# Setup instructions:
#   1. Replace every occurrence of YOUR_DOMAIN with your actual domain name
#      (e.g. relay.example.com).
#   2. SSL certificates are generated by Certbot — follow the SSL certificate
#      step in SELF_HOSTING.md before enabling the HTTPS server block.
#   3. Mount this file into the nginx container:
#      volumes:
#        - ./nginx/dissolve.conf:/etc/nginx/conf.d/default.conf:ro

# ── Upstream ─────────────────────────────────────────────────────────────────

upstream relay {
    server relay:3001;
}

# ── WebSocket connection upgrade map (from nginx.org/en/docs/http/websocket.html) ─

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Certbot ACME challenge — must be accessible over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else redirects to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # React static build served by nginx
    root /usr/share/nginx/html;
    index index.html;

    # ── Relay API paths (HTTP) ──────────────────────────────────────────────
    location ~ ^/(send|inbox|caps|requestCaps|requests|directory|ws-challenge|health|block)(/.*)?$ {
        proxy_pass http://relay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket upgrade — CRITICAL ───────────────────────────────────────
    # proxy_http_version 1.1 is required; without it nginx defaults to
    # HTTP/1.0 and the WebSocket upgrade silently fails.
    location /ws {
        proxy_pass http://relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── React SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
